# ============================================================
# dev-test-review workflow spec (v5 统一调度版)
# ============================================================
# 8 个核心 agent，平等对待，主 Agent + workflow-advisor 统一调度
# 所有通信通过 artifact 文件，无共享上下文
# ============================================================

name: dev-test-review
version: "5.0"
description: >
  开发-测试-审查 workflow（v5 统一调度版）。
  8 个核心 agent 平等对待，主 Agent + workflow-advisor 统一调度。
  Phase 1 并行启动（dev + test-plan + review-criteria），
  Phase 2 执行验证（test + review + product-review）。

# ----------------------------------------------------------
# Agent registry (8 个核心 agent)
# ----------------------------------------------------------
agents:
  workflow-advisor:
    role: advisor
    description: 顾问：分析任务、制定计划、监督流程
    config: .claude/agents/workflow-advisor.md

  dev-agent:
    role: developer
    description: 开发：业务代码 + L1/L2 测试
    outputs:
      - .workflow/artifacts/{task_id}/dev-output.json

  test-agent:
    role: tester
    description: 测试：Phase 1 设计测试方法，Phase 2 执行测试
    inputs:
      - .workflow/artifacts/{task_id}/dev-output.json
    outputs:
      - .workflow/artifacts/{task_id}/test-plan.json
      - .workflow/artifacts/{task_id}/test-report.json

  review-agent:
    role: reviewer
    description: 审查：代码审查 + H1-H5 安全测试
    inputs:
      - .workflow/artifacts/{task_id}/dev-output.json
    outputs:
      - .workflow/artifacts/{task_id}/review-report.json

  product-reviewer:
    role: product_owner
    description: 产品：Phase 1 定义审查规则，Phase 2 执行审查
    inputs:
      - .workflow/artifacts/{task_id}/dev-output.json
    outputs:
      - .workflow/artifacts/{task_id}/review-criteria.json
      - .workflow/artifacts/{task_id}/product-review.json

  system-inspector:
    role: supervisor
    description: 监督：系统健康 + 执行效率监督
    inputs:
      - .workflow/artifacts/{task_id}/*.json
    outputs:
      - .workflow/artifacts/{task_id}/system-inspector-report.json
    trigger: after_each_task

  validator:
    role: validator
    description: 验证：Schema + 数据完整性验证
    inputs:
      - .workflow/artifacts/{task_id}/*.json
    outputs:
      - .workflow/artifacts/{task_id}/validation-report.json
    trigger: after_phase_2

  optimizer:
    role: optimizer
    description: 优化：生成优化计划，需用户审批
    inputs:
      - .workflow/artifacts/{task_id}/system-inspector-report.json
    outputs:
      - .workflow/artifacts/{task_id}/optimization-plan.json
    trigger: system_inspector_trigger
    requires_approval: true

# ----------------------------------------------------------
# Trigger schema
# ----------------------------------------------------------
trigger_schema:
  values:
    - name: llm_recognition
      description: LLM 主动识别（最高优先级）
    - name: hook
      description: PostToolUse hook 自动触发
    - name: user_manual
      description: 用户手动触发（兜底）
    - name: error_response
      description: 错误响应（最高优先级）
    - name: after_each_task
      description: 每个任务完成后触发
    - name: after_phase_2
      description: Phase 2 完成后触发
    - name: system_inspector_trigger
      description: 由 system-inspector 触发

# ----------------------------------------------------------
# Task routing
# ----------------------------------------------------------
task_routing:
  simple_task:
    criteria:
      - 单文件修改
      - 无依赖变更
    action: 内联编排，直接调用 dev-agent
  complex_task:
    criteria:
      - 多文件修改
      - 有依赖变更
      - 需要并行审查
    action: 调用 workflow('dev-test-review', { task_id })

# ----------------------------------------------------------
# Triggers
# ----------------------------------------------------------
triggers:
  - priority: 0
    method: error_response
    description: 用户明确指出错误时触发
  - priority: 1
    method: llm_recognition
    description: LLM 主动识别
  - priority: 2
    method: hook
    description: PostToolUse hook 自动触发
  - priority: 3
    method: user_manual
    description: 用户手动触发

# ----------------------------------------------------------
# Gate inference
# ----------------------------------------------------------
gate_inference:
  input: dev-output.json
  rules:
    - condition: "any changed_file in core_modules"
      gate: L2
      core_modules: ["crates/wb-core/", "crates/wb-processor/", "crates/wb-ai/"]
    - condition: "any changed_file in storage_modules"
      gate: L2
      storage_modules: ["crates/wb-storage/"]
    - condition: "any changed_file in tauri_commands"
      gate: L2
      tauri_commands: ["src-tauri/src/commands/"]
    - condition: "any changed_file in frontend_only"
      gate: L1
      frontend_only: ["src/"]
    - condition: "any changed_file in docs_or_config"
      gate: L1
      docs_or_config: ["docs/", ".config/", "scripts/"]
    - condition: default
      gate: L2

# ----------------------------------------------------------
# Execution flow
# ----------------------------------------------------------
flow:
  # 错误响应（最高优先级，按需触发）
  error_response_phase:
    trigger: "error_response trigger fires"
    steps:
      - step: record_phenomenon
        description: 记录错误现象
      - step: reflect_process
        description: 反思工作流执行过程
      - step: locate_root_cause
        description: 定位根因
      - step: formulate_improvement
        description: 制定改进方案
      - step: execute_fix
        description: 触发 dev-agent 修复
    output: error-response.json

  # Phase 1: 并行启动（三个 agent 同时开始，各自独立工作）
  phase_1_parallel_start:
    description: >
      三个 agent 同时启动，各自独立工作：
      - dev-agent：编写业务代码 + L1/L2 测试
      - test-agent：设计测试方法、定义验证目标
      - product-reviewer：定义审查规则、明确验收标准
    steps:
      - step: run_dev
        agent: dev-agent
        timeout: 10m
        outputs: dev-output.json

      - step: run_test_plan
        agent: test-agent
        timeout: 5m
        outputs: test-plan.json

      - step: run_review_criteria
        agent: product-reviewer
        timeout: 5m
        outputs: review-criteria.json

    # 使用 Workflow tool 的 parallel() 调用实现真正并行
    parallel: true

    on_complete:
      goto: phase_2_execute_validation

  # Phase 2: 执行验证（基于 Phase 1 的输出）
  phase_2_execute_validation:
    description: >
      基于 Phase 1 的输出，执行验证：
      - test-agent：执行之前设计的测试
      - product-reviewer：按之前定义的标准审查
      - review-agent：代码审查 + H1-H5 安全测试
    steps:
      - step: run_test_execute
        agent: test-agent
        inputs: [dev-output.json, test-plan.json]
        timeout: 10m
        outputs: test-report.json

      - step: run_product_review
        agent: product-reviewer
        inputs: [dev-output.json, review-criteria.json]
        timeout: 5m
        outputs: product-review.json

      - step: run_review
        agent: review-agent
        inputs: [dev-output.json]
        timeout: 5m
        outputs: review-report.json

    # 使用 Workflow tool 的 parallel() 调用实现真正并行
    parallel: true

    on_complete:
      goto: phase_3_validation

  # Phase 3: 验证（Phase 2 完成后）
  phase_3_validation:
    description: >
      Phase 2 完成后，调用 validator 验证所有 artifact。
    steps:
      - step: run_validator
        agent: validator
        timeout: 2m
        outputs: validation-report.json

    on_complete:
      goto: check_results

  # 结果检查
  check_results:
    - condition: "all of dev-output.json, test-plan.json, review-criteria.json, test-report.json, product-review.json, review-report.json exist"
      goto: evaluate_results
    - condition: "any output missing"
      goto: handle_failure

  evaluate_results:
    - step: merge_suggested_actions
      description: 合并三个 agent 的 suggested_action
    - step: check_product_review
      condition: "product-review.json.verdict == 'fail' and category == 'bug'"
      goto: handle_failure
      with:
        priority: highest
    - step: check_test_results
      condition: "test-report.json.result == 'fail'"
      goto: handle_failure
    - step: check_review_results
      condition: "review-report.json.verdict == 'request_changes'"
      goto: handle_review_failure
    - step: check_validation
      condition: "validation-report.json.overall_valid == false"
      goto: handle_validation_failure
    - condition: "all passed"
      goto: phase_4_supervision

  # 失败处理
  handle_failure:
    - step: read_failure_location
      description: 读取 source_location 和 suggested_action
    - step: check_trend
      description: 检查同一 location 是否连续失败
    - step: trigger_dev_fix
      agent: dev-agent
      inputs: [test-report.json, review-report.json, product-review.json]
    - step: re_run_phase_2
      goto: phase_2_execute_validation

  handle_review_failure:
    - step: check_merge_with_test
      description: 检查是否有同时存在的 test 失败
    - step: trigger_dev_fix
      agent: dev-agent
    - step: re_run_phase_2
      goto: phase_2_execute_validation

  handle_validation_failure:
    - step: notify_user
      description: 通知用户验证失败
      action: 展示 validation-report.json
    - step: wait_for_user_decision
      description: 等待用户决定如何处理
      goto: done

  escalate:
    - step: write_final_report
      description: 写入 final-report.json，status=blocked

  # Phase 4: 监督（任务完成后）
  phase_4_supervision:
    description: >
      任务完成后，调用 system-inspector 进行系统监督。
    steps:
      - step: run_system_inspector
        agent: system-inspector
        timeout: 3m
        outputs: system-inspector-report.json

    on_complete:
      goto: check_inspector_results

  check_inspector_results:
    - condition: "system-inspector-report.json contains agent-level issues"
      goto: trigger_optimizer
    - condition: "no agent-level issues"
      goto: done

  trigger_optimizer:
    description: >
      如果 system-inspector 发现 Agent 级问题，
      触发 optimizer 生成优化计划（需用户审批）。
    steps:
      - step: run_optimizer
        agent: optimizer
        timeout: 5m
        outputs: optimization-plan.json
        requires_approval: true

    on_complete:
      goto: done

  done:
    - step: archive_artifacts
      description: 归档 artifacts
    - step: write_final_report
      description: 写入 final-report.json，status=done

# ----------------------------------------------------------
# Retry strategy
# ----------------------------------------------------------
retry:
  L1:
    max_retries: 3
    trend_stop: 2
  L2:
    max_retries: 2
    trend_stop: 2
  L4:
    max_retries: 1
    trend_stop: 1
  L5:
    max_retries: 0
    trend_stop: 0

# ----------------------------------------------------------
# Artifacts
# ----------------------------------------------------------
artifacts:
  base_dir: .workflow/artifacts/{task_id}/
  files:
    error_response:
      path: error-response.json
      writer: workflow-advisor
      readers: [dev-agent, user]
      schema: .workflow/templates/error-response.schema.json
    dev_output:
      path: dev-output.json
      writer: dev-agent
      readers: [workflow-advisor, test-agent, review-agent, product-reviewer]
      schema: .workflow/templates/dev-output.schema.json
    test_plan:
      path: test-plan.json
      writer: test-agent
      readers: [workflow-advisor, test-agent]
      schema: .workflow/templates/test-plan.schema.json
    review_criteria:
      path: review-criteria.json
      writer: product-reviewer
      readers: [workflow-advisor, product-reviewer]
      schema: .workflow/templates/review-criteria.schema.json
    test_report:
      path: test-report.json
      writer: test-agent
      readers: [workflow-advisor, dev-agent]
      schema: .workflow/templates/test-report.schema.json
    product_review:
      path: product-review.json
      writer: product-reviewer
      readers: [workflow-advisor, dev-agent]
      schema: .workflow/templates/product-review.schema.json
    review_report:
      path: review-report.json
      writer: review-agent
      readers: [workflow-advisor]
      schema: .workflow/templates/review-report.schema.json
    validation_report:
      path: validation-report.json
      writer: validator
      readers: [workflow-advisor]
      schema: .workflow/templates/validation-report.schema.json
    system_inspector_report:
      path: system-inspector-report.json
      writer: system-inspector
      readers: [workflow-advisor, optimizer]
      schema: .workflow/templates/system-inspector-report.schema.json
    optimization_plan:
      path: optimization-plan.json
      writer: optimizer
      readers: [workflow-advisor, user]
      schema: .workflow/templates/optimization-plan.schema.json
    final_report:
      path: final-report.json
      writer: workflow-advisor
      readers: [user]
      schema: .workflow/templates/final-report.schema.json

# ----------------------------------------------------------
# Uncovered paths detection
# ----------------------------------------------------------
uncovered_paths_detection:
  stage_1_script:
    description: "文件级粗筛"
    tool: scripts/test-impact.sh
    output: test-report.json 的 uncovered_files 字段
  stage_1_5_reuse:
    description: "代码复用粗筛"
    output: test-report.json 的 code_reuse_warnings 字段
  stage_2_llm:
    description: "函数级细检 + 执行路径验证"
    output:
      uncovered_paths: test-report.json 的 uncovered_paths 字段
      execution_path_verification: test-report.json 的 execution_path_verification 字段
