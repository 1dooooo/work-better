<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bgGrad)"/>
  <g transform="translate(256, 256)" filter="url(#glow)">
    <ellipse cx="0" cy="0" rx="140" ry="80" fill="none" stroke="url(#mainGrad)" stroke-width="12" opacity="0.9"/>
    <circle cx="0" cy="0" r="50" fill="url(#mainGrad)" opacity="0.95"/>
    <circle cx="0" cy="0" r="25" fill="#fff"/>
    <circle cx="10" cy="-10" r="8" fill="#fff" opacity="0.9"/>
  </g>
  <g transform="translate(256, 256)" opacity="0.3">
    <line x1="-180" y1="-60" x2="-140" y2="-60" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
    <line x1="-180" y1="-30" x2="-140" y2="-30" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
    <line x1="-180" y1="0" x2="-140" y2="0" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
    <line x1="140" y1="-60" x2="180" y2="-60" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
    <line x1="140" y1="-30" x2="180" y2="-30" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
    <line x1="140" y1="0" x2="180" y2="0" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
  </g>
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="url(#mainGrad)" text-anchor="middle" opacity="0.9">WB</text>
</svg>
